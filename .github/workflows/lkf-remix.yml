name: lkf remix

on:
  workflow_dispatch:
    inputs:
      remix:
        description: 'Remix name (e.g. desktop-amd64, desktop-arm64, server-amd64-rt, desktop-amd64-llvm)'
        required: false
        default: 'desktop-amd64'
      distro:
        description: 'Target distro'
        required: false
        default: 'debian'
        type: choice
        options: [debian, devuan, ubuntu]
      release:
        description: 'Distro release (leave blank for default)'
        required: false
        default: ''
  push:
    branches: [main]
    paths:
      - 'remixes/**'
      - 'scripts/lkf-build.sh'

jobs:
  remix:
    name: lkf remix ${{ inputs.remix || 'desktop-amd64' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install lkf
        run: |
          git clone --depth=1 https://github.com/Interested-Deving-1896/lkf /opt/lkf
          sudo ln -sf /opt/lkf/lkf.sh /usr/local/bin/lkf
          chmod +x /opt/lkf/lkf.sh

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential bc bison flex libssl-dev libelf-dev \
            dwarves debhelper dpkg-dev fakeroot rsync git curl \
            gcc-aarch64-linux-gnu gcc-arm-linux-gnueabihf \
            gcc-riscv64-linux-gnu gcc-s390x-linux-gnu \
            clang lld llvm

      - name: Run lkf remix
        env:
          DISTRO: ${{ inputs.distro || 'debian' }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SKIP_OCI: '1'
          SKIP_RELEASE: '1'
        run: |
          REMIX="${{ inputs.remix || 'desktop-amd64' }}"
          lkf remix "remixes/${REMIX}.toml"

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: lkf-remix-${{ inputs.remix || 'desktop-amd64' }}
          path: |
            build/**/*.deb
            build/**/*.rpm
            build/**/*.pkg.tar.zst
          if-no-files-found: warn
          retention-days: 14